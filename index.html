<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Feed My Belly helps you choose a nearby restaurant."
  >

  <title>Feed My Belly 😋</title>

  <link
    rel="stylesheet"
    href="style.css?v=8"
  >
</head>

<body>

  <main class="container">

    <header class="app-header">

      <div
        class="tobin-mouth"
        role="img"
        aria-label="Animated Tobin opening his mouth"
      ></div>

      <h1>Feed My Belly</h1>

      <p class="subtitle">
        Can't decide what to eat? I'll pick for you.
      </p>

    </header>

    <section
      class="food-section"
      aria-label="Choose a food category"
    >

      <div class="food-buttons">

        <button
          type="button"
          onclick="findFood('korean_restaurant')"
        >
          🇰🇷 Korean
        </button>

        <button
          type="button"
          onclick="findFood('japanese_restaurant')"
        >
          🇯🇵 Japanese
        </button>

        <button
          type="button"
          onclick="findFood('chinese_restaurant')"
        >
          🇨🇳 Chinese
        </button>

        <button
          type="button"
          onclick="findFood('italian_restaurant')"
        >
          🇮🇹 Italian
        </button>

        <button
          type="button"
          onclick="findFood('hamburger_restaurant')"
        >
          🍔 Burger
        </button>

        <button
          type="button"
          onclick="findFood('pizza_restaurant')"
        >
          🍕 Pizza
        </button>

        <button
          type="button"
          onclick="findFood('fast_food_restaurant')"
        >
          🍟 Fast Food
        </button>

        <button
          type="button"
          onclick="findFood('hawaiian restaurant')"
        >
          🌺 Local Hawaiian
        </button>

        <button
          type="button"
          class="surprise-button"
          onclick="findFood('restaurant')"
        >
          🎲 Surprise Me
        </button>

      </div>

    </section>

    <section
      id="restaurant"
      class="restaurant-card"
      aria-live="polite"
    >
      <p class="starting-message">
        Choose a food type to get started 😊
      </p>
    </section>

  </main>

  <script src="app.js?v=17"></script>

</body>

</html>
