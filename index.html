<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Feed My Belly 😋</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">

    <h1>Feed My Belly 😋</h1>

    <p>Can't decide what to eat? I'll pick for you.</p>

    <div class="food-buttons">

      <button onclick="findFood('korean_restaurant')">
        🇰🇷 Korean
      </button>

      <button onclick="findFood('japanese_restaurant')">
        🇯🇵 Japanese
      </button>

      <button onclick="findFood('chinese_restaurant')">
        🇨🇳 Chinese
      </button>

      <button onclick="findFood('italian_restaurant')">
        🇮🇹 Italian
      </button>

      <button onclick="findFood('hamburger_restaurant')">
        🍔 Burger
      </button>

      <button onclick="findFood('pizza_restaurant')">
        🍕 Pizza
      </button>

      <button onclick="findFood('fast_food_restaurant')">
        🍟 Fast Food
      </button>

      <button onclick="findFood('hawaiian')">
        🌺 Local Hawaiian
      </button>

      <button
        class="surprise-button"
        onclick="findFood('restaurant')"
      >
        🎲 Surprise Me
      </button>

    </div>

    <div id="restaurant"></div>

  </main>

  <script src="app.js?v=9"></script>

</body>

</html>
